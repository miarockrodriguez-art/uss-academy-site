<body>
<div class="container">
<a href="/" class="back">← Back to USS Academy</a>
<h1>CWP Exam Registration & Waiver</h1>
<p class="subtitle">USS Academy LLC · Concealed Weapons Permit Exam Registration</p>

<form id="examForm">

<h2>Exam Information</h2>
<div class="field"><label>Exam Date <span class="required">*</span></label><input type="date" name="exam_date" required></div>

<h2>Personal Information</h2>
<div class="row">
  <div class="field"><label>First Name <span class="required">*</span></label><input type="text" name="first_name" required></div>
  <div class="field"><label>Last Name <span class="required">*</span></label><input type="text" name="last_name" required></div>
</div>
<div class="field"><label>State Issued ID Number <span class="required">*</span></label><input type="text" name="state_id" required></div>
<div class="field"><label>Mobile Number <span class="required">*</span></label><input type="tel" name="mobile" required></div>
<div class="field"><label>Email <span class="required">*</span></label><input type="email" name="email" required></div>

<h2>Certificate Delivery</h2>
<div class="field">
  <label>Digital Certificate Requested <span class="required">*</span></label>
  <div class="radio-group">
    <label><input type="radio" name="digital_cert" value="yes" required> Yes (Emailed within 7-10 business days)</label>
    <label><input type="radio" name="digital_cert" value="no"> No</label>
  </div>
  <p class="note">Digital certificates are emailed to the address provided above.</p>
</div>

<h2>Signature</h2>
<div class="sig-area">
  <div class="field"><label>Print Full Name <span class="required">*</span></label><input type="text" name="print_name" required></div>
  <div class="row">
    <div class="field"><label>First Name</label><input type="text" name="sig_first"></div>
    <div class="field"><label>Last Name</label><input type="text" name="sig_last"></div>
  </div>
  <div class="field"><label>Date Signed</label><input type="date" name="date_signed"></div>
</div>

<div style="margin:12px 0;display:flex;flex-direction:column;gap:10px;">
        <label style="display:flex;align-items:flex-start;gap:8px;font-size:11px;font-weight:300;color:#b0bec5;line-height:1.5;cursor:pointer;">
          <input type="checkbox" class="sms-consent" style="margin-top:2px;accent-color:#c9a84c;flex-shrink:0;">
          By checking this box, you agree to receive SMS messages from USS Academy LLC including appointment reminders, booking confirmations, class schedules, and promotional offers. Message frequency varies. Message and data rates may apply. This field is optional. Reply STOP to opt out at any time. Reply HELP for help. View our <a href="https://www.ussacademy.org/privacy-policy" style="color:#c9a84c;text-decoration:underline;">Privacy Policy</a> and <a href="https://www.ussacademy.org/terms-of-service" style="color:#c9a84c;text-decoration:underline;">Terms of Service</a>.
        </label>
      </div>
<button type="submit" class="submit-btn">Submit Exam Registration</button>
</form>
</div>

<script>
var CRM_WEBHOOK = 'https://services.leadconnectorhq.com/hooks/GOBk9IDY9xnt7JJeDYsl/webhook-trigger/LVl0To2GE8jo5d279OkE';
document.getElementById('examForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var fd = new FormData(this);
  var payload = {
    form_type: 'cwp_exam_registration',
    source: 'ussacademy.org',
    first_name: fd.get('first_name') || '',
    last_name: fd.get('last_name') || '',
    full_name: ((fd.get('first_name') || '') + ' ' + (fd.get('last_name') || '')).trim(),
    email: fd.get('email') || '',
    phone: fd.get('mobile') || '',
    mobile: fd.get('mobile') || '',
    state_id: fd.get('state_id') || '',
    exam_date: fd.get('exam_date') || '',
    digital_cert: fd.get('digital_cert') || '',
    print_name: fd.get('print_name') || '',
    submitted_at: new Date().toISOString(),
    tags: ['website-form-submission', 'form: cwp_exam_registration'],
    notify: ['mia@ussacademy.org', 'josh@ussacademy.org', 'support@ussacademy.org']
  };
  fetch(CRM_WEBHOOK, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(function(){ alert('Exam registration submitted! You will receive a confirmation via SMS and email.'); })
  .catch(function(){ alert('Exam registration submitted! You will receive a confirmation via SMS and email.'); });
});
document.querySelector('[name="date_signed"]').valueAsDate = new Date();
</script>
