[build]
  publish = "."

# Clean URL redirects
[[redirects]]
  from = "/tos"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/class-registration"
  to = "/waiver-class-registration.html"
  status = 200

[[redirects]]
  from = "/exam-registration"
  to = "/waiver-exam-registration.html"
  status = 200

[[redirects]]
  from = "/range-waiver"
  to = "/waiver-range.html"
  status = 200

# Do NOT add a catch-all /* redirect — let Netlify serve static files directly

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
